# ─────────────────────────────────────────────────────────────────────────────
# Workflow: Build & Publish das imagens Firecrawl usadas pelo FBNet
# Repo: github.com/fcjbispo/firecrawl  (fork de mendableai/firecrawl)
#
# MODELO: "release branch"
#   - Branch CANÔNICA de release:  fbnet-docker-firecrawl-release
#     → build AUTOMÁTICO a cada push; publica :latest + :sha-<short>
#   - Demais branches (ex.: fbnet-docker-firecrawl-v4): build MANUAL
#     (workflow_dispatch → escolha a branch na UI); publica :<nome-da-branch>
#     + :sha-<short>. NUNCA toca em :latest → produção fica protegida.
#   - Promoção: validar numa branch experimental → fast-forward da release
#     para o commit aprovado → push dispara auto-build de :latest.
#
# Fluxo completo documentado no CLAUDE.md deste repo (seção "Release flow").
#
# ANATOMIA (resumo p/ aprendizado):
#   on:            gatilhos (push = automático; workflow_dispatch = manual)
#   env:           variáveis de ambiente de todos os steps
#   jobs/steps:    sequência de tarefas; `uses:` = Action pronta, `run:` = shell
#   secrets.X:     valores sensíveis do repo (Settings → Secrets and variables)
#
# SECRETS necessários:
#   DOCKERHUB_USERNAME = fcjbispo
#   DOCKERHUB_TOKEN    = Access Token do Docker Hub (Read & Write), NÃO a senha
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Publish Firecrawl images

on:
  push:
    # Auto-build SOMENTE na branch de release.
    branches: [fbnet-docker-firecrawl-release]
    paths:
      - 'apps/api/**'
      - 'apps/playwright-service-ts/**'
      - '.github/workflows/firecrawl-publish.yml'
  workflow_dispatch: # build manual de qualquer branch (Actions → Run workflow)

env:
  API_IMAGE: fcjbispo/fbnet-firecrawl
  PW_IMAGE: fcjbispo/fbnet-firecrawl-playwright

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1) Clona o repo no runner, no commit que disparou o workflow.
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Habilita Docker Buildx (BuildKit) — o Dockerfile do apps/api usa
      #    `--mount=type=cache`, que exige BuildKit. Também viabiliza cache GHA.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Login no Docker Hub usando secrets (vale só durante este job).
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4) Gera as tags da imagem da API conforme a branch disparadora:
      #      - release  -> :latest + :sha-<short>           (produção)
      #      - qualquer outra -> :<nome-da-branch> + :sha-<short>  (experimentação)
      #    O `enable=...` liga/desliga cada regra conforme github.ref.
      - name: Metadata for API image
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,format=short
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/fbnet-docker-firecrawl-release' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/fbnet-docker-firecrawl-release' }}

      # 5) Build + push da API (usada por firecrawl e firecrawl-worker no FBNet).
      #    tags vem do step de metadata. Cache GHA (scope=api) acelera rebuilds.
      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # 6) Mesma lógica de tags para a imagem do Playwright (scope diferente
      #    p/ não chocar o cache da API — GHA não permite 2 gravações no mesmo scope).
      - name: Metadata for Playwright image
        id: meta_pw
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PW_IMAGE }}
          tags: |
            type=sha,format=short
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/fbnet-docker-firecrawl-release' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/fbnet-docker-firecrawl-release' }}

      - name: Build & push playwright image
        uses: docker/build-push-action@v6
        with:
          context: apps/playwright-service-ts
          push: true
          tags: ${{ steps.meta_pw.outputs.tags }}
          cache-from: type=gha,scope=playwright
          cache-to: type=gha,mode=max,scope=playwright